services:
  postgres:
    image: postgres:17-alpine
    container_name: taskwave-postgres
    environment:
      POSTGRES_USER: taskwave
      POSTGRES_PASSWORD: taskwave_secret
      POSTGRES_DB: taskwave
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./schema.sql:/docker-entrypoint-initdb.d/01-schema.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U taskwave -d taskwave"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:8-alpine
    container_name: taskwave-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  api:
    build:
      context: .
      dockerfile: apps/api/Dockerfile
    container_name: taskwave-api
    ports:
      - "3000:3000"
    environment:
      NODE_ENV: production
      PORT: 3000
      DATABASE_URL: postgres://taskwave:taskwave_secret@postgres:5432/taskwave
      REDIS_URL: redis://redis:6379
      JWT_SECRET: taskwave_jwt_secret_change_in_production
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  worker:
    build:
      context: .
      dockerfile: apps/worker/Dockerfile
    container_name: taskwave-worker
    environment:
      NODE_ENV: production
      DATABASE_URL: postgres://taskwave:taskwave_secret@postgres:5432/taskwave
      REDIS_URL: redis://redis:6379
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  frontend:
    build:
      context: .
      dockerfile: apps/frontend/Dockerfile
    container_name: taskwave-frontend
    ports:
      - "5173:80"
    depends_on:
      - api

volumes:
  postgres_data:
  redis_data: